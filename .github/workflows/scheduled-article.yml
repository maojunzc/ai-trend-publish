name: Scheduled Article Generation

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Dry-run 模式（不上传不发布）"
        type: boolean
        default: true
      maxArticles:
        description: "文章数量限制"
        type: number
        default: 10
      sourceType:
        description: "抓取 provider 限制"
        type: string
        default: ""

jobs:
  check-switch:
    name: Check workflow switch
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.switch.outputs.enabled }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read workflow switch
        id: switch
        run: |
          if [ -f workflow.config.json ]; then
            ENABLED=$(jq -r '.workflow.enabled // "false"' workflow.config.json)
          else
            ENABLED="false"
          fi
          echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"
          echo "Switch status: enabled=$ENABLED"

  generate:
    name: Run Article Workflow
    needs: [check-switch]
    if: needs.check-switch.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.14

      - name: Cache Dependencies
        run: deno cache src/index.ts scripts/run.workflow.ts

      - name: Create config file
        run: |
          cat > trendpublish.config.ts << 'CONFIGEOF'
          import { defineConfig } from "@src/utils/config/define-config.ts";

          export default defineConfig({
            server: {
              apiKey: "${{ secrets.SERVER_API_KEY }}",
            },
            providers: {
              ai: {
                baseUrl: "${{ secrets.AI_BASE_URL || 'https://api.deepseek.com/v1' }}",
                apiKey: "${{ secrets.AI_API_KEY || '' }}",
                model: "${{ secrets.AI_MODEL || 'deepseek-chat' }}",
              },
              fetch: {
                firecrawl: { apiKey: "${{ secrets.FIRECRAWL_API_KEY }}" },
                jina: { apiKey: "${{ secrets.JINA_API_KEY }}" },
                brave: { apiKey: "${{ secrets.BRAVE_API_KEY }}" },
                twitter: {
                  bearerToken: "${{ secrets.TWITTER_BEARER_TOKEN }}",
                  xquikApiKey: "${{ secrets.XQUIK_API_KEY }}",
                },
              },
              image: {
                dashscope: { apiKey: "${{ secrets.DASHSCOPE_API_KEY }}" },
                minimax: { apiKey: "${{ secrets.MINIMAX_API_KEY }}" },
              },
              publish: {
                weixin: {
                  appId: "${{ secrets.WEIXIN_APP_ID }}",
                  appSecret: "${{ secrets.WEIXIN_APP_SECRET }}",
                },
                weixinRelay: {
                  url: "${{ secrets.WEIXIN_RELAY_URL }}",
                  token: "${{ secrets.WEIXIN_RELAY_TOKEN }}",
                },
              },
              notify: {
                bark: { url: "${{ secrets.BARK_URL }}" },
              },
              vector: {
                embedding: {
                  baseUrl: "${{ secrets.EMBEDDING_BASE_URL }}",
                  apiKey: "${{ secrets.EMBEDDING_API_KEY }}",
                  model: "${{ secrets.EMBEDDING_MODEL }}",
                },
              },
            },
            features: {
              article: {
                dryRun: ${{ github.event.inputs.dryRun != 'false' }},
                template: "minimal",
                promptProfile: "technology",
                sources: (() => {
                  const raw = "${{ secrets.ARTICLE_SOURCES }}";
                  return raw ? raw.split(",").map(s => s.trim()).filter(Boolean) : ["https://news.ycombinator.com/"];
                })(),
                renderer: {
                  template: "dynamic",
                  promptProfile: "technology",
                },
                notifications: {
                  channels: (() => {
                    const raw = "${{ secrets.NOTIFY_CHANNELS }}";
                    return raw ? raw.split(",").map(s => s.trim()).filter(Boolean) : [];
                  })(),
                },
              },
            },
            storage: {
              artifacts: { provider: "local", outputDir: "src/temp" },
              runState: { provider: "local-json", outputDir: "src/temp" },
              vector: { provider: "sqlite", sqlitePath: "src/temp/trendpublish.sqlite3" },
            },
          });
          CONFIGEOF
          ls -la trendpublish.config.ts

      - name: Run article workflow
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dryRun }}" != "false" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ github.event.inputs.maxArticles }}" ]; then ARGS="$ARGS --max-articles ${{ github.event.inputs.maxArticles }}"; fi
          if [ -n "${{ github.event.inputs.sourceType }}" ]; then ARGS="$ARGS --source ${{ github.event.inputs.sourceType }}"; fi
          deno run -A scripts/run.workflow.ts $ARGS || {
            EXIT_CODE=$?
            if [ "${{ secrets.AI_API_KEY }}" = "" ]; then
              echo ""
              echo "=============================================="
              echo "  ⚠️  需要配置 AI_API_KEY Secret 才能运行"
              echo ""
              echo "  在 GitHub 仓库 Settings → Secrets and variables"
              echo "  → Actions 中添加以下 Secret:"
              echo ""
              echo "  AI_BASE_URL   (默认: https://api.deepseek.com/v1)"
              echo "  AI_API_KEY    (必填: 你的 LLM API 密钥)"
              echo "  AI_MODEL      (默认: deepseek-chat)"
              echo "=============================================="
            fi
            exit $EXIT_CODE
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: article-output-${{ github.run_id }}
          path: |
            src/temp/
            !src/temp/.gitkeep
          retention-days: 7

      - name: Prepare release assets
        if: success()
        shell: bash
        run: |
          set -euo pipefail

          TS=$(date -u +"%Y%m%d-%H%M")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "RELEASE_TAG=article-${TS}-${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=Article Run ${TS}" >> "$GITHUB_ENV"

          # 将 src/temp/runs/ 下本 run 的产物打包为 zip
          RUN_DIR="src/temp/runs"
          ZIP_FILE="article-output-${TS}-${SHORT_SHA}.zip"
          if [ -d "$RUN_DIR" ] && [ "$(find "$RUN_DIR" -maxdepth 1 -type d | wc -l)" -gt 1 ]; then
            cd src/temp
            zip -r "../../${ZIP_FILE}" . -x ".gitkeep"
            cd ../..
          fi

          ls -la *.zip 2>/dev/null || echo "(no zip produced)"

      - name: Create GitHub Release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          ZIP_FILE="article-output-*.zip"
          if ! ls ${ZIP_FILE} 1>/dev/null 2>&1; then
            echo "No zip file found, skipping release."
            exit 0
          fi

          DRY_RUN_FLAG="--prerelease"
          BODY_PREFIX="**Dry-run preview**"
          if [ "${{ github.event.inputs.dryRun }}" = "false" ]; then
            DRY_RUN_FLAG=""
            BODY_PREFIX="**正式发布**"
          fi

          # shell 通配符展开 zip 文件名
          ZIP_PATH=$(ls ${ZIP_FILE} | head -1)

          gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_NAME" \
            --notes "$(printf '%s\n- Run: %s\n- Workflow: %s\n- Commit: %s\n' \
              "$BODY_PREFIX" \
              "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
              "$GITHUB_WORKFLOW" \
              "$GITHUB_SHA")" \
            $DRY_RUN_FLAG \
            "$ZIP_PATH"
