services:
  weixin-relay:
    image: ghcr.io/maojunzc/ai-trend-publish:latest
    container_name: trendpublish-weixin-relay
    restart: unless-stopped
    command: ["deno", "task", "relay"]
    ports:
      - "8080:8080"
    environment:
      TRENDPUBLISH_CONFIG: /app/config/trendpublish.config.ts
      TRENDPUBLISH_RUNTIME: docker
      PORT: "8080"
    volumes:
      - ./config/trendpublish.config.ts:/app/config/trendpublish.config.ts:ro
